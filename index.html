  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lign-items:center;justify-content:center;padding:24px;animation:sgh-overlay-in .18s ease;\">\n      <div onclick=\"{{ stop }}\" dir=\"rtl\" style=\"background:#fff;border-radius:20px;width:100%;max-width:420px;box-shadow:0 30px 80px -20px rgba(13,38,48,.5);animation:sgh-scale-in .22s cubic-bezier(.2,.8,.3,1);padding:26px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;\">\n          <div style=\"display:flex;align-items:center;gap:11px;\">\n            <span style=\"width:38px;height:38px;border-radius:11px;background:#EAF4FB;color:#137CAE;display:flex;align-items:center;justify-content:center;\">\n              <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"1\" y=\"3\" width=\"15\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M16 8h4l3 3v5h-7V8z\"><\u002Fpath><circle cx=\"5.5\" cy=\"18.5\" r=\"2.5\"><\u002Fcircle><circle cx=\"18.5\" cy=\"18.5\" r=\"2.5\"><\u002Fcircle><\u002Fsvg>\n            <\u002Fspan>\n            <div style=\"font-size:16px;font-weight:700;color:#16323D;\">رقم الموصّل<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeModal }}\" style=\"width:32px;height:32px;border-radius:9px;border:none;background:#F2F7F9;color:#7A8F98;cursor:pointer;font-size:17px;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <p style=\"font-size:13px;color:#7A8F98;margin-bottom:16px;line-height:1.6;\">أدخل رقم جوال الموصّل — ستُرسل له بيانات كل طلب جاهزة على واتساب.<\u002Fp>\n        <label style=\"font-size:12px;font-weight:600;color:#5C7079;display:block;margin-bottom:6px;\">رقم الجوال (بدون كود الدولة)<\u002Flabel>\n        <input value=\"{{ driverInput }}\" oninput=\"{{ onDriverInput }}\" placeholder=\"0512345678\" dir=\"ltr\" style=\"width:100%;height:46px;padding:0 14px;border:1px solid #E2EBEF;border-radius:11px;font-size:15px;letter-spacing:1px;color:#1B2A31;outline:none;text-align:right;transition:all .15s;\" style-focus=\"border-color:#2AA1D4;box-shadow:0 0 0 4px rgba(42,161,212,.1);\">\n        <p style=\"font-size:11px;color:#9AAEB6;margin-top:7px;\">يُحفظ تلقائياً في المتصفح<\u002Fp>\n        <div style=\"display:flex;gap:10px;justify-content:flex-end;margin-top:22px;\">\n          <button onclick=\"{{ closeModal }}\" style=\"height:42px;padding:0 18px;border-radius:11px;border:1px solid #E2EBEF;background:#fff;color:#5C7079;font-size:13.5px;font-weight:600;cursor:pointer;\">إلغاء<\u002Fbutton>\n          <button onclick=\"{{ saveDriver }}\" style=\"height:42px;padding:0 22px;border-radius:11px;border:none;background:#2AA1D4;color:#fff;font-size:13.5px;font-weight:700;cursor:pointer;box-shadow:0 6px 16px -6px rgba(42,161,212,.6);\">حفظ<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ TOAST ============ -->\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#16323D;color:#fff;padding:13px 22px;border-radius:12px;font-size:13.5px;font-weight:500;z-index:300;box-shadow:0 16px 40px -12px rgba(13,38,48,.5);animation:sgh-fade-up .25s ease;white-space:nowrap;\">{{ toast }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst ST = {\n  new:        { label:'جديد',         c:'#42606E', bg:'#EAF1F4', dot:'#5B7A8A' },\n  preparing:  { label:'جاري التحضير', c:'#B5751A', bg:'#FBF1E0', dot:'#D98A1F' },\n  delivering: { label:'جاري التوصيل', c:'#137CAE', bg:'#E6F4FB', dot:'#2AA1D4' },\n  done:       { label:'تم التوصيل',   c:'#2C7E3C', bg:'#E8F5EC', dot:'#37A24C' },\n};\nconst NEXT = { new:'preparing', preparing:'delivering', delivering:'done', done:null };\nconst NEXT_LABEL = { new:'بدء التحضير', preparing:'خرج للتوصيل', delivering:'تم التسليم ✓' };\nconst FILTERS = [\n  { k:'all', label:'الكل' }, { k:'new', label:'جديد' }, { k:'preparing', label:'تحضير' },\n  { k:'delivering', label:'توصيل' }, { k:'done', label:'مكتمل' },\n];\nconst NAV = [\n  { k:'all', label:'جميع الطلبات', dot:'#8BA0A8' },\n  { k:'new', label:'طلبات جديدة', dot:ST.new.dot },\n  { k:'preparing', label:'جاري التحضير', dot:ST.preparing.dot },\n  { k:'delivering', label:'جاري التوصيل', dot:ST.delivering.dot },\n  { k:'done', label:'تم التوصيل', dot:ST.done.dot },\n];\nconst AVATARS = [\n  ['#E6F4FB','#137CAE'], ['#E8F5EC','#2C7E3C'], ['#FBF1E0','#B5751A'], ['#EEF0FB','#5B5FC7'], ['#FBEEF2','#C7568A'],\n];\n\nclass Component extends DCLogic {\n  state = {\n    orders: this.load(),\n    filter: 'all',\n    search: '',\n    currentId: null,\n    modal: null,\n    form: { name:'', fileNo:'', phone:'', branch:'', relation:'المريض بنفسه', notes:'', img:null },\n    aiLoading: false,\n    dragOver: false,\n    driverPhone: (typeof localStorage!=='undefined' && localStorage.getItem('sgh-driver-phone')) || '',\n    driverInput: '',\n    toast: '',\n    isMobile: (typeof window!=='undefined' && window.innerWidth < 780),\n  };\n\n  componentDidMount() {\n    this._resize = () => {\n      const m = window.innerWidth < 780;\n      if (m !== this.state.isMobile) this.setState({ isMobile: m });\n    };\n    window.addEventListener('resize', this._resize);\n  }\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._resize);\n    clearTimeout(this._t);\n  }\n\n  load() {\n    let saved = [];\n    try { saved = JSON.parse(localStorage.getItem('sgh-pharmacy-orders') || '[]'); } catch(e){}\n    if (saved.length) return saved;\n    const t = Date.now();\n    return [\n      { id:'ORD-100481', name:'HODAI AHMAD', fileNo:'2177509', phone:'0508801793', branch:'HAIL', relation:'المريض بنفسه', notes:'المريضة تريد توصيل الأدوية إلى المنزل في أقرب وقت.', status:'new', ts:t-5*60000 },\n      { id:'ORD-100480', name:'محمد علي السالم', fileNo:'1988341', phone:'0505123456', branch:'MADINAH', relation:'أحد أفراد الأسرة', notes:'أدوية ضغط ومرض مزمن — تُسلّم لابنه.', status:'preparing', ts:t-32*60000 },\n      { id:'ORD-100479', name:'فاطمة أحمد الزهراني', fileNo:'2043211', phone:'0501987654', branch:'MADINAH', relation:'المريض بنفسه', notes:'', status:'delivering', ts:t-95*60000 },\n      { id:'ORD-100478', name:'سعد ناصر العتيبي', fileNo:'1765432', phone:'0556789012', branch:'RIYADH', relation:'جهة أخرى', notes:'أدوية مزمنة شهرية.', status:'done', ts:t-3*3600000 },\n      { id:'ORD-100477', name:'نورة خالد الدوسري', fileNo:'2210094', phone:'0533210987', branch:'JEDDAH', relation:'المريض بنفسه', notes:'يرجى الاتصال قبل الوصول.', status:'done', ts:t-5*3600000 },\n    ];\n  }\n  save(orders) { try { localStorage.setItem('sgh-pharmacy-orders', JSON.stringify(orders)); } catch(e){} }\n\n  toast(msg) {\n    this.setState({ toast: msg });\n    clearTimeout(this._t);\n    this._t = setTimeout(() => this.setState({ toast:'' }), 2600);\n  }\n\n  fmt(ts) {\n    const d = new Date(ts);\n    const p = n => String(n).padStart(2,'0');\n    return `${p(d.getHours())}:${p(d.getMinutes())} · ${p(d.getDate())}/${p(d.getMonth()+1)}`;\n  }\n  initial(name) { return (name||'?').trim().charAt(0).toUpperCase(); }\n  avatarFor(id) {\n    let h=0; for (const c of id) h=(h*31+c.charCodeAt(0))>>>0;\n    return AVATARS[h % AVATARS.length];\n  }\n\n  counts() {\n    const c = { all:this.state.orders.length, new:0, preparing:0, delivering:0, done:0 };\n    this.state.orders.forEach(o => { if(c[o.status]!==undefined) c[o.status]++; });\n    return c;\n  }\n\n  // ---- nav / filter ----\n  setFilter(k) { this.setState({ filter:k }); }\n  onSearch = (e) => this.setState({ search: e.target.value });\n\n  // ---- modals ----\n  openAdd = () => this.setState({ modal:'add', form:{ name:'', fileNo:'', phone:'', branch:'', relation:'المريض بنفسه', notes:'', img:null }, aiLoading:false });\n  openDriver = () => this.setState({ modal:'driver', driverInput: this.state.driverPhone });\n  closeModal = () => this.setState({ modal:null });\n  stop = (e) => e.stopPropagation();\n\n  setField(k, v) { this.setState(s => ({ form:{ ...s.form, [k]:v } })); }\n  onFieldName = e => this.setField('name', e.target.value);\n  onFieldFile = e => this.setField('fileNo', e.target.value);\n  onFieldPhone = e => this.setField('phone', e.target.value);\n  onFieldBranch = e => this.setField('branch', e.target.value);\n  onFieldRelation = e => this.setField('relation', e.target.value);\n  onFieldNotes = e => this.setField('notes', e.target.value);\n\n  // ---- upload + AI ----\n  onDragOver = e => { e.preventDefault(); this.setState({ dragOver:true }); };\n  onDragLeave = e => { e.preventDefault(); this.setState({ dragOver:false }); };\n  onDrop = e => { e.preventDefault(); this.setState({ dragOver:false }); const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('image/')) this.processImage(f); };\n  onFile = e => { const f = e.target.files[0]; if (f) this.processImage(f); };\n\n  processImage(file) {\n    const reader = new FileReader();\n    reader.onload = async ev => {\n      const dataUrl = ev.target.result;\n      this.setState(s => ({ form:{ ...s.form, img:dataUrl }, aiLoading:true }));\n      const b64 = dataUrl.split(',')[1];\n      try {\n        const out = await window.claude.complete({\n          messages: [{ role:'user', content:[\n            { type:'image', source:{ type:'base64', media_type:file.type, data:b64 } },\n            { type:'text', text:'استخرج بيانات طلب توصيل الدواء من الصورة. أجب بـ JSON فقط بدون أي نص آخر بهذا الشكل: {\"name\":\"\",\"fileNo\":\"\",\"phone\":\"\",\"branch\":\"\",\"relation\":\"\",\"notes\":\"\"}' },\n          ]}],\n        });\n        const clean = (out||'{}').replace(/```json|```/g,'').trim();\n        const m = clean.match(/\\{[\\s\\S]*\\}/);\n        const p = JSON.parse(m ? m[0] : clean);\n        this.setState(s => ({ aiLoading:false, form:{ ...s.form,\n          name: p.name || s.form.name,\n          fileNo: p.fileNo || s.form.fileNo,\n          phone: p.phone || s.form.phone,\n          branch: p.branch || s.form.branch,\n          relation: p.relation || s.form.relation,\n          notes: p.notes || s.form.notes,\n        }}));\n        this.toast('✨ تم استخراج البيانات — راجعها قبل الحفظ');\n      } catch (err) {\n        this.setState({ aiLoading:false });\n        this.toast('⚠️ تعذّر الاستخراج — أدخل البيانات يدوياً');\n      }\n    };\n    reader.readAsDataURL(file);\n  }\n\n  saveOrder = () => {\n    const f = this.state.form;\n    if (!f.name.trim() || !f.phone.trim()) { this.toast('⚠️ الرجاء إدخال اسم المريض ورقم الجوال'); return; }\n    const order = {\n      id: 'ORD-' + Date.now().toString().slice(-6),\n      name:f.name.trim(), fileNo:f.fileNo.trim(), phone:f.phone.trim(),\n      branch:f.branch, relation:f.relation, notes:f.notes.trim(),\n      status:'new', ts:Date.now(),\n    };\n    const orders = [order, ...this.state.orders];\n    this.save(orders);\n    this.setState({ orders, modal:null });\n    this.toast('✅ تم إضافة الطلب بنجاح');\n  };\n\n  // ---- detail ----\n  openDetail(id) { this.setState({ modal:'detail', currentId:id }); }\n  setStatus(id, val) {\n    const orders = this.state.orders.map(o => o.id===id ? { ...o, status:val } : o);\n    this.save(orders);\n    this.setState({ orders });\n    this.toast('✅ تم تحديث الحالة');\n  }\n  quickNext(id) {\n    const o = this.state.orders.find(x => x.id===id);\n    if (!o) return; const n = NEXT[o.status]; if (!n) return;\n    this.setStatus(id, n);\n  }\n  deleteCurrent = () => {\n    const id = this.state.currentId;\n    const orders = this.state.orders.filter(o => o.id!==id);\n    this.save(orders);\n    this.setState({ orders, modal:null });\n    this.toast('🗑 تم حذف الطلب');\n  };\n\n  // ---- driver ----\n  onDriverInput = e => this.setState({ driverInput: e.target.value });\n  saveDriver = () => {\n    const v = this.state.driverInput.trim();\n    if (!v) { this.toast('⚠️ أدخل رقم الجوال'); return; }\n    try { localStorage.setItem('sgh-driver-phone', v); } catch(e){}\n    this.setState({ driverPhone:v, modal:null });\n    this.toast('✅ تم حفظ رقم الموصّل');\n  };\n  sendDriver = () => {\n    const o = this.state.orders.find(x => x.id===this.state.currentId);\n    if (!o) return;\n    if (!this.state.driverPhone) { this.openDriver(); return; }\n    const raw = this.state.driverPhone.replace(/\\D/g,'');\n    const p = raw.startsWith('966') ? raw : raw.startsWith('0') ? '966'+raw.slice(1) : '966'+raw;\n    const msg = `🏥 *المستشفى السعودي الألماني — طلب دواء منزلي*\\n\\n👤 الاسم: ${o.name}\\n📁 رقم الملف: ${o.fileNo||'—'}\\n📞 جوال المريض: ${o.phone}\\n🏢 الفرع: ${o.branch||'—'}\\n\\n📝 ${o.notes||'لا توجد ملاحظات'}\\n\\n🔖 رقم الطلب: ${o.id}`;\n    window.open(`https://wa.me/${p}?text=${encodeURIComponent(msg)}`, '_blank');\n  };\n\n  // ---- export ----\n  exportExcel = () => {\n    const head = ['رقم الطلب','اسم المريض','رقم الملف','الجوال','الفرع','الحالة','وقت الطلب','ملاحظات'];\n    const rows = this.state.orders.map(o => [o.id,o.name,o.fileNo,o.phone,o.branch,(ST[o.status]||{}).label||o.status,this.fmt(o.ts),o.notes]);\n    const csv = [head,...rows].map(r => r.map(c => `\"${(c||'').toString().replace(/\"/g,'\"\"')}\"`).join(',')).join('\\n');\n    const blob = new Blob(['\\uFEFF'+csv], { type:'text/csv;charset=utf-8' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url; a.download = 'sgh-pharmacy-' + new Date().toISOString().slice(0,10) + '.csv'; a.click();\n    URL.revokeObjectURL(url);\n    this.toast('📊 تم تصدير الكشف');\n  };\n\n  icon(name) {\n    const h = React.createElement;\n    const svg = (...kids) => h('svg', { width:18, height:18, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:1.9, strokeLinecap:'round', strokeLinejoin:'round' }, ...kids);\n    const map = {\n      total: svg(h('path',{key:1,d:'M9 11H5a2 2 0 0 0-2 2v7h6V11z'}), h('path',{key:2,d:'M15 7H9v13h6V7z'}), h('path',{key:3,d:'M21 3h-6v17h6V3z'})),\n      preparing: svg(h('path',{key:1,d:'M10.5 2v6.5l-5 8.5a2 2 0 0 0 1.7 3h13.6a2 2 0 0 0 1.7-3l-5-8.5V2'}), h('line',{key:2,x1:8,y1:2,x2:16,y2:2})),\n      delivering: svg(h('rect',{key:1,x:1,y:3,width:15,height:13,rx:2}), h('path',{key:2,d:'M16 8h4l3 3v5h-7V8z'}), h('circle',{key:3,cx:5.5,cy:18.5,r:2.5}), h('circle',{key:4,cx:18.5,cy:18.5,r:2.5})),\n      done: svg(h('path',{key:1,d:'M22 11.08V12a10 10 0 1 1-5.93-9.14'}), h('polyline',{key:2,points:'22 4 12 14.01 9 11.01'})),\n    };\n    return map[name] || null;\n  }\n\n  renderVals() {\n    const s = this.state;\n    const c = this.counts();\n    const cur = s.orders.find(o => o.id===s.currentId);\n\n    // nav\n    const navItems = NAV.map(n => {\n      const active = s.filter===n.k;\n      return {\n        label:n.label, dot:n.dot, count:c[n.k],\n        bg: active ? '#EAF6FB' : 'transparent',\n        color: active ? '#137CAE' : '#4A626C',\n        countBg: active ? '#D4ECF7' : '#F0F4F6',\n        countColor: active ? '#137CAE' : '#8BA0A8',\n        onClick: () => this.setFilter(n.k),\n      };\n    });\n\n    // filter tabs\n    const filterTabs = FILTERS.map(f => {\n      const active = s.filter===f.k;\n      return { label:f.label, bg: active?'#2AA1D4':'transparent', color: active?'#fff':'#7A8F98', onClick:()=>this.setFilter(f.k) };\n    });\n\n    // stats\n    const stats = [\n      { label:'إجمالي الطلبات', value:c.all, sub:'كل الطلبات المسجّلة', accent:'#2AA1D4', iconBg:'#E6F4FB', valueColor:'#16323D', icon:this.icon('total') },\n      { label:'جاري التحضير', value:c.preparing, sub:'بانتظار الصيدلية', accent:'#D98A1F', iconBg:'#FBF1E0', valueColor:'#B5751A', icon:this.icon('preparing') },\n      { label:'جاري التوصيل', value:c.delivering, sub:'في الطريق للمريض', accent:'#2AA1D4', iconBg:'#E6F4FB', valueColor:'#137CAE', icon:this.icon('delivering') },\n      { label:'تم التوصيل', value:c.done, sub:'طلبات مكتملة', accent:'#37A24C', iconBg:'#E8F5EC', valueColor:'#2C7E3C', icon:this.icon('done') },\n    ];\n\n    // visible orders\n    const q = s.search.trim().toLowerCase();\n    let list = s.orders.filter(o => {\n      if (s.filter!=='all' && o.status!==s.filter) return false;\n      if (q) return (o.name||'').toLowerCase().includes(q) || (o.phone||'').includes(q) || (o.fileNo||'').includes(q);\n      return true;\n    });\n    list.sort((a,b) => {\n      if (a.status==='done' && b.status!=='done') return 1;\n      if (b.status==='done' && a.status!=='done') return -1;\n      return b.ts - a.ts;\n    });\n    const visibleOrders = list.map((o,i) => {\n      const st = ST[o.status]; const av = this.avatarFor(o.id);\n      const next = NEXT[o.status];\n      return {\n        num: i+1, name:o.name||'—', initial:this.initial(o.name), avatarBg:av[0], avatarColor:av[1],\n        fileLabel: o.fileNo ? 'ملف: '+o.fileNo : 'بدون ملف',\n        phone: o.phone||'—', telHref: 'tel:'+(o.phone||''),\n        branch: o.branch||'—', timeStr:this.fmt(o.ts),\n        statusLabel:st.label, statusBg:st.bg, statusColor:st.c, statusDot:st.dot,\n        hasNext: !!next, isDone: o.status==='done',\n        nextLabel: NEXT_LABEL[o.status]||'', nextColor: next ? ST[next].dot : '#37A24C',\n        onOpen: () => this.openDetail(o.id),\n        onNext: (e) => { e.stopPropagation(); this.quickNext(o.id); },\n      };\n    });\n\n    // detail\n    let detail = {};\n    if (cur) {\n      const st = ST[cur.status]; const av = this.avatarFor(cur.id);\n      detail = {\n        id:cur.id, name:cur.name||'—', initial:this.initial(cur.name),\n        avatarBg:av[0], avatarColor:av[1],\n        fileNo:cur.fileNo||'—', phone:cur.phone||'—', branch:cur.branch||'—',\n        relation:cur.relation||'—', timeStr:this.fmt(cur.ts), notes:cur.notes||'لا توجد ملاحظات',\n        statusLabel:st.label, statusBg:st.bg, statusColor:st.c, statusDot:st.dot,\n        headerBg1: st.bg, headerBg2:'#F7FAFB',\n        noDriver: !s.driverPhone,\n        driverLabel: s.driverPhone ? ('سيُرسل إلى ‎'+s.driverPhone) : 'لم يُضف رقم الموصّل بعد',\n        steps: ['new','preparing','delivering','done'].map(k => {\n          const sel = cur.status===k; const stt = ST[k];\n          return {\n            label: stt.label, dot: stt.dot,\n            border: sel ? stt.dot : '#E6EFF2',\n            bg: sel ? stt.bg : '#fff',\n            color: sel ? stt.c : '#9AAEB6',\n            onClick: () => this.setStatus(cur.id, k),\n          };\n        }),\n      };\n    }\n\n    const titles = { all:'جميع الطلبات', new:'الطلبات الجديدة', preparing:'طلبات قيد التحضير', delivering:'طلبات قيد التوصيل', done:'الطلبات المكتملة' };\n    const today = new Date();\n    const dd = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'][today.getDay()];\n    const todayStr = `${dd} · ${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()}`;\n\n    const m = s.isMobile;\n    return {\n      navItems, filterTabs, stats, visibleOrders,\n      isEmpty: visibleOrders.length===0,\n      isMobile: m,\n      sidebarDisplay: m ? 'none' : 'flex',\n      statsCols: m ? 'repeat(2,1fr)' : 'repeat(4,1fr)',\n      mainPad: m ? '16px 14px 32px' : '26px 30px 40px',\n      topbarPad: m ? '0 14px' : '0 28px',\n      brandMetaDisplay: m ? 'none' : 'block',\n      tableMinWidth: m ? '660px' : 'auto',\n      pageTitle: titles[s.filter]||'الطلبات',\n      pageSubtitle: `${visibleOrders.length} طلب معروض · ${c.all} إجمالاً`,\n      todayStr,\n      search: s.search, onSearch: this.onSearch,\n      driverStatusText: s.driverPhone ? ('الموصّل جاهز · ‎'+s.driverPhone) : 'لم يُضف رقم الموصّل بعد — أضفه من الإعدادات.',\n\n      openAdd:this.openAdd, openDriver:this.openDriver, exportExcel:this.exportExcel,\n      closeModal:this.closeModal, stop:this.stop,\n\n      addOpen: s.modal==='add', detailOpen: s.modal==='detail' && !!cur, driverOpen: s.modal==='driver',\n\n      form:s.form, aiLoading:s.aiLoading, hasImg: !!s.form.img,\n      uploadBorder: s.dragOver ? '#2AA1D4' : '#D3E1E6',\n      uploadBg: s.dragOver ? '#E6F4FB' : '#F7FAFB',\n      onDragOver:this.onDragOver, onDragLeave:this.onDragLeave, onDrop:this.onDrop, onFile:this.onFile,\n      onFieldName:this.onFieldName, onFieldFile:this.onFieldFile, onFieldPhone:this.onFieldPhone,\n      onFieldBranch:this.onFieldBranch, onFieldRelation:this.onFieldRelation, onFieldNotes:this.onFieldNotes,\n      saveOrder:this.saveOrder,\n\n      detail, deleteCurrent:this.deleteCurrent, sendDriver:this.sendDriver,\n\n      driverInput:s.driverInput, onDriverInput:this.onDriverInput, saveDriver:this.saveDriver,\n\n      toast: s.toast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
